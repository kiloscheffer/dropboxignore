name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync deps
        run: uv sync --all-extras

      - name: Build wheel + sdist
        run: uv build

      - name: Build Windows binaries
        # pyinstaller is a build-only tool, not a runtime or dev dep — install
        # ephemerally for this run rather than declaring it in pyproject.toml.
        run: uv run --with pyinstaller pyinstaller pyinstaller/dropboxignore.spec

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/dropboxignore.exe
            dist/dropboxignored.exe
          generate_release_notes: true
